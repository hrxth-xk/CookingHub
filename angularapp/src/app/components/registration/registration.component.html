 <div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
 
      <!-- Registration Card -->
      <div class="register-card p-4">
 
        <h3 class="text-center mb-4">Registration</h3>
 
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
 
          <!-- Email -->
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="Email">
            <div class="text-danger"
              *ngIf="registerForm.get('Email')?.invalid && registerForm.get('Email')?.touched">
              Valid email required
            </div>
          </div>
 
          <!-- Password -->
          <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" formControlName="Password">
            <div class="text-danger"
              *ngIf="registerForm.get('Password')?.invalid && registerForm.get('Password')?.touched">
              Password must be at least 6 characters
            </div>
          </div>
 
          <!-- Confirm Password -->
          <div class="mb-3">
            <label>Confirm Password</label>
            <input
              type="password"
              class="form-control"
              formControlName="ConfirmPassword"
              placeholder="Confirm password">
 
            <div class="text-danger"
              *ngIf="registerForm.get('ConfirmPassword')?.value !== registerForm.get('Password')?.value && registerForm.get('ConfirmPassword')?.touched">
              Passwords do not match
            </div>
          </div>
 
          <!-- Username -->
          <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control" formControlName="Username">
            <div class="text-danger"
              *ngIf="registerForm.get('Username')?.invalid && registerForm.get('Username')?.touched">
              Username required
            </div>
          </div>
 
          <!-- Mobile -->
          <div class="mb-3">
            <label>Mobile Number</label>
            <input type="text" class="form-control" formControlName="MobileNumber">
            <div class="text-danger"
              *ngIf="registerForm.get('MobileNumber')?.invalid && registerForm.get('MobileNumber')?.touched">
              Enter 10-digit mobile number
            </div>
          </div>
 
          <!-- Role -->
          <div class="mb-3">
            <label>Role</label>
            <select class="form-control" formControlName="UserRole">
              <option value="User">User</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
 
          <div class="text-danger mb-2" *ngIf="error">{{error}}</div>
 
          <!-- Register Button -->
          <button type="submit"
                  class="btn register-btn w-100"
                  [disabled]="registerForm.invalid">
            Register
          </button>
 
        </form>
 
      </div>
 
    </div>
  </div>
</div>
