<!-- <div class="admin-background"> -->

<div class="admin-page-wrapper">

  <div class="page-header">

    <h2 class="page-title">Create New Cooking Class</h2>

    <p class="page-subtitle">
      Add class details, chef information and cooking requirements.
    </p>

  </div>

  <div class="dashboard-card form-card">

    <form [formGroup]="classForm" (ngSubmit)="onSubmit()">

      <div class="form-grid">

        <div class="form-field">

          <label>Class Name</label>

          <input
          type="text"
          placeholder="Example: Italian Pasta Workshop"
          formControlName="ClassName">

          <div class="error"
          *ngIf="classForm.get('ClassName')?.invalid && classForm.get('ClassName')?.touched">
          Class Name is required
          </div>

        </div>

        <div class="form-field">

          <label>Cuisine Type</label>

          <input
          type="text"
          placeholder="Italian / Indian / Baking"
          formControlName="CuisineType">

        </div>

        <div class="form-field">

          <label>Chef Name</label>

          <input
          type="text"
          placeholder="Chef Gordon"
          formControlName="ChefName">

        </div>

        <div class="form-field">

          <label>Location</label>

          <input
          type="text"
          placeholder="Kitchen Studio A"
          formControlName="Location">

        </div>

        <div class="form-field">

          <label>Duration (hours)</label>

          <input
          type="number"
          placeholder="3"
          formControlName="DurationInHours">

        </div>

        <div class="form-field">

          <label>Fee</label>

          <input
          type="number"
          placeholder="2500"
          formControlName="Fee">

        </div>

        <div class="form-field full">

          <label>Skill Level</label>

          <select formControlName="SkillLevel">

            <option value="">Select Skill Level</option>

            <option value="Beginner">Beginner</option>

            <option value="Intermediate">Intermediate</option>

            <option value="Advanced">Advanced</option>

            <option value="Expert">Expert</option>

          </select>

        </div>

        <div class="form-field full">

          <label>Ingredients Provided</label>

          <textarea
          rows="3"
          placeholder="Flour, Eggs, Olive Oil..."
          formControlName="IngredientsProvided"></textarea>

        </div>

        <div class="form-field full">

          <label>Special Requirements</label>

          <textarea
          rows="3"
          placeholder="Bring apron or knife kit"
          formControlName="SpecialRequirements"></textarea>

        </div>

      </div>

      <div class="error-global" *ngIf="error">

        {{error}}

      </div>

      <div class="form-actions">

        <button class="btn-primary" type="submit">
          Create Cooking Class
        </button>

      </div>

    </form>

  </div>

</div>
