<div class="admin-page-wrapper">

  <div class="page-header">
    <h2 class="page-title">Apply for Class</h2>
    <p class="page-subtitle">Share your preferences and goals to join this cooking experience</p>
  </div>

  <div class="dashboard-card form-card">

    <form [formGroup]="requestForm" (ngSubmit)="onSubmit()">

      <div class="form-grid">

        <div class="form-field full">
          <label>Dietary Preferences</label>
          <input type="text" placeholder="e.g. Vegan, Gluten-free, No nuts" formControlName="DietaryPreferences" />
          <div class="error"
            *ngIf="requestForm.get('DietaryPreferences')?.invalid && requestForm.get('DietaryPreferences')?.touched">
            Dietary Preferences are required
          </div>
        </div>

        <div class="form-field full">
          <label>Cooking Goals</label>
          <input type="text" placeholder="e.g. Learn pasta techniques, Master baking" formControlName="CookingGoals" />
          <div class="error"
            *ngIf="requestForm.get('CookingGoals')?.invalid && requestForm.get('CookingGoals')?.touched">
            Cooking Goals are required
          </div>
        </div>

        <div class="form-field full">
          <label>Comments (Optional)</label>
          <textarea rows="3" placeholder="Any additional notes for the chef..." formControlName="Comments"></textarea>
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-maple btn-maple-outline" routerLink="/user/my-requests">
          Back
        </button>
        <button type="submit" class="btn-maple btn-maple-solid" [disabled]="requestForm.invalid">
          Submit Request
        </button>
      </div>

    </form>

  </div>

</div>
