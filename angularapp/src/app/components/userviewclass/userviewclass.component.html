<div class="admin-page-wrapper">

  <div class="page-header">
    <h2 class="page-title">Available Classes</h2>
    <p class="page-subtitle">Browse chef-led cooking experiences and apply to join</p>
  </div>

  <div class="table-tools">
    <input
      type="text"
      class="search-box"
      placeholder="Search by class name..."
      [(ngModel)]="searchText"
      (input)="filter()" />
  </div>

  <div class="class-grid" *ngIf="filteredClasses.length > 0; else noData">

    <div class="class-card dashboard-card" *ngFor="let c of filteredClasses">

      <div class="class-card-header">
        <h3 class="class-card-title">{{ c.ClassName }}</h3>
        <span class="skill-badge">{{ c.SkillLevel }}</span>
      </div>

      <div class="class-card-details">
        <div class="detail-row"><span class="detail-label">Cuisine</span><span>{{ c.CuisineType }}</span></div>
        <div class="detail-row"><span class="detail-label">Chef</span><span>{{ c.ChefName }}</span></div>
        <div class="detail-row"><span class="detail-label">Location</span><span>{{ c.Location }}</span></div>
        <div class="detail-row"><span class="detail-label">Duration</span><span>{{ c.DurationInHours }} hrs</span></div>
        <div class="detail-row"><span class="detail-label">Fee</span><span class="fee-value">{{ c.Fee | currency }}</span></div>
      </div>

      <button class="btn-maple btn-maple-solid class-apply-btn" (click)="apply(c.CookingClassId)">
        Apply Now
      </button>

    </div>

  </div>

  <ng-template #noData>
    <div class="dashboard-card">
      <p class="empty-msg">No classes available at the moment.</p>
    </div>
  </ng-template>

</div>
