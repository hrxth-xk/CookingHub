  <div class="feedback-container">
 
    <h2 class="page-title">My Feedback</h2>
   
    <div *ngIf="feedbacks.length > 0; else noData">
   
      <div class="feedback-card" *ngFor="let fb of feedbacks">
   
        <div class="feedback-content">
   
          <p class="feedback-text">{{fb.FeedbackText}}</p>
   
          <div class="feedback-footer">
   
            <span class="feedback-date">
              {{fb.Date | date}}
            </span>
   
            <button class="delete-btn"
                    (click)="deleteFeedback(fb.FeedbackId)">
              Delete
            </button>
   
          </div>
   
        </div>
   
      </div>
   
    </div>
   
    <ng-template #noData>
      <p class="no-data">No feedback found</p>
    </ng-template>
   
  </div>
