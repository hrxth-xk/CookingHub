<div class="admin-page-wrapper">

  <div class="page-header">
    <h2 class="page-title">My Feedback</h2>
    <p class="page-subtitle">Review and manage your submitted feedback</p>
  </div>

  <div class="feedback-grid" *ngIf="feedbacks.length > 0; else noData">

    <div class="feedback-card" *ngFor="let fb of feedbacks">

      <div class="feedback-body">
        {{ fb.FeedbackText }}
      </div>

      <div class="feedback-footer">
        <span class="feedback-date">{{ fb.Date | date:'mediumDate' }}</span>
        <button class="btn-delete" (click)="deleteFeedback(fb.FeedbackId)">
          Delete
        </button>
      </div>

    </div>

  </div>

  <ng-template #noData>
    <div class="dashboard-card">
      <p class="empty-msg">No feedback found. Share your experience!</p>
    </div>
  </ng-template>

</div>
