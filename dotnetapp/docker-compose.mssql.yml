services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cookinghub-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CookingHubSql!234"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
